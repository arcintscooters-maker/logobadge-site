<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogoBadge - Google Reviews Badge for Shopify</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; line-height: 1.6; }
    .hero { text-align: center; padding: 80px 20px; background: linear-gradient(135deg, #f8f9fa 0%, #e8f4f8 100%); }
    .hero h1 { font-size: 42px; margin-bottom: 16px; }
    .hero p { font-size: 18px; color: #666; max-width: 600px; margin: 0 auto 32px; }
    .hero .badge-demo { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 24px; background: #fff; border: 1px solid #e0e0e0; font-size: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .hero .badge-demo .g { width: 20px; height: 20px; }
    .hero .badge-demo .stars { color: #fbbc04; }
    .cta { display: inline-block; margin-top: 32px; padding: 14px 32px; background: #008060; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px; }
    .cta:hover { background: #006e52; }
    .footer { text-align: center; padding: 40px 20px; background: #f8f9fa; font-size: 14px; color: #888; }
    .footer a { color: #666; margin: 0 12px; }
    nav { display: flex; justify-content: center; gap: 24px; padding: 16px; background: #fff; border-bottom: 1px solid #eee; font-size: 14px; }
    nav a { color: #333; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/privacy">Privacy Policy</a>

    <h1>LogoBadge</h1>
    <p>Display your Google Reviews badge right under your store logo. Build instant trust with every visitor. Zero speed impact.</p>
